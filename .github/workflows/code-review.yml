name: 🤖 CodeLens AI Code Review

on:
  pull_request:
    branches: [main, master, develop]
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR Number (for manual trigger)'
        required: false
        type: string

env:
  CODELENS_API_URL: ${{ secrets.CODELENS_API_URL || 'http://localhost:8090' }}
  CODELENS_MIN_SCORE: ${{ secrets.CODELENS_MIN_SCORE || '0' }}

jobs:
  # ──────────────────────────────────────────────────────────
  # Main Code Review Job
  # ──────────────────────────────────────────────────────────
  codelens-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      statuses: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR info
        id: pr_info
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const pr = context.payload.pull_request;
            const prNum = pr?.number || context.inputs.pr_number;
            if (!prNum) {
              core.setOutput('pr_number', '0');
              core.setOutput('pr_title', 'Unknown PR');
              core.setOutput('pr_body', '');
              core.setOutput('head_sha', context.sha);
              core.setOutput('base_branch', 'unknown');
              return;
            }
            const { data: prData } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNum,
            });
            core.setOutput('pr_number', String(prData.number));
            core.setOutput('pr_title', prData.title);
            core.setOutput('pr_body', prData.body || '');
            core.setOutput('head_sha', prData.head.sha);
            core.setOutput('base_branch', prData.base.ref);
            core.setOutput('author', prData.user?.login || 'unknown');

      - name: Get changed files
        id: changed_files
        run: |
          BASE_BRANCH="${{ steps.pr_info.outputs.base_branch }}"
          echo "Base branch: $BASE_BRANCH"

          # Get changed files against base branch
          CHANGED_FILES=$(git diff --name-only "origin/$BASE_BRANCH...HEAD" 2>/dev/null | grep -v "^\.git/" | head -50)
          echo "CHANGED_FILES=$CHANGED_FILES" >> $GITHUB_OUTPUT

          if [ -z "$CHANGED_FILES" ]; then
            echo "No changed files found, using all tracked files"
            CHANGED_FILES=$(git ls-files | grep -E "\.(py|js|ts|jsx|tsx|java|go)$" | head -20)
          fi
          echo "Files to analyze:"
          echo "$CHANGED_FILES"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -q fastapi uvicorn pydantic httpx python-multipart 2>/dev/null || true
          echo "Dependencies installed"

      - name: Start backend server
        run: |
          cd backend
          nohup python -c "import uvicorn; from app.main import app; uvicorn.run(app, host='127.0.0.1', port=8090)" > /tmp/codelens.log 2>&1 &
          BACKEND_PID=$!
          echo "Backend PID: $BACKEND_PID"
          sleep 4
          if curl -sf http://127.0.0.1:8090/health > /dev/null; then
            echo "✅ Backend is running"
          else
            echo "⚠️  Backend may still be starting, continuing anyway..."
            cat /tmp/codelens.log
          fi

      - name: Run CodeLens scan
        id: scan
        run: |
          echo "=== CodeLens AI Scan ==="

          # Collect all code to analyze
          CODE_PAYLOAD='{"files":[]}'

          # For each changed file, gather content
          for FILE in ${{ steps.changed_files.outputs.CHANGED_FILES }}; do
            if [ ! -f "$FILE" ]; then
              echo "Skipping non-file: $FILE"
              continue
            fi

            SIZE=$(wc -c < "$FILE" 2>/dev/null || echo 0)
            if [ "$SIZE" -gt 500000 ]; then
              echo "Skipping large file: $FILE ($SIZE bytes)"
              continue
            fi

            EXT="${FILE##*.}"
            LANG="python"
            case "$EXT" in
              js)   LANG="javascript" ;;
              ts)   LANG="typescript" ;;
              jsx)  LANG="typescript" ;;
              tsx)  LANG="typescript" ;;
              java) LANG="java" ;;
              go)   LANG="go" ;;
              py)   LANG="python" ;;
            esac

            # Escape content for JSON
            CONTENT=$(cat "$FILE" 2>/dev/null | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")
            echo "Analyzing: $FILE (lang=$LANG)"

            CODE_PAYLOAD=$(echo "$CODE_PAYLOAD" | python3 -c "
import sys,json
d=json.load(sys.stdin)
d['files'].append({'path':'$FILE','language':'$LANG','content':$CONTENT})
print(json.dumps(d))
")
          done

          echo "Total files to analyze: $(echo $CODE_PAYLOAD | python3 -c 'import sys,json; print(len(json.load(sys.stdin)[\"files\"]))')"

          # Call the review-pr endpoint
          SCAN_RESULT=$(curl -s -X POST http://127.0.0.1:8090/api/v1/review-pr \
            -H "Content-Type: application/json" \
            -d "$CODE_PAYLOAD" 2>/dev/null)

          if echo "$SCAN_RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print('OK')" 2>/dev/null; then
            echo "$SCAN_RESULT" | python3 -c "
import sys,json
d=json.load(sys.stdin)
s=d.get('summary',{})
print(f'SCORE={d.get(\"score\",0)}')
print(f'HIGH={s.get(\"high\",0)}')
print(f'MEDIUM={s.get(\"medium\",0)}')
print(f'LOW={s.get(\"low\",0)}')
print(f'TOTAL={s.get(\"total\",0)}')
print(f'SESSION_ID={d.get(\"session_id\",\"\")}')
print(f'LOC={d.get(\"lines_of_code\",0)}')
" >> $GITHUB_OUTPUT

            echo "✅ Scan complete"
          else
            echo "⚠️  API call returned unexpected result"
            echo "RAW_RESULT=$SCAN_RESULT"
            echo "SCORE=0" >> $GITHUB_OUTPUT
            echo "HIGH=0" >> $GITHUB_OUTPUT
            echo "MEDIUM=0" >> $GITHUB_OUTPUT
            echo "LOW=0" >> $GITHUB_OUTPUT
            echo "TOTAL=0" >> $GITHUB_OUTPUT
          fi

      - name: Set PR status (commit success regardless of issues)
        run: |
          echo "PR review completed, issues found are informational only"

      - name: Generate PR comment
        if: always()
        id: comment
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const score = parseInt('${{ steps.scan.outputs.SCORE || '0' }}');
            const high = parseInt('${{ steps.scan.outputs.HIGH || '0' }}');
            const medium = parseInt('${{ steps.scan.outputs.MEDIUM || '0' }}');
            const low = parseInt('${{ steps.scan.outputs.LOW || '0' }}');
            const total = parseInt('${{ steps.scan.outputs.TOTAL || '0' }}');
            const sessionId = '${{ steps.scan.outputs.SESSION_ID || '' }}';
            const loc = parseInt('${{ steps.scan.outputs.LOC || '0' }}');
            const prNum = '${{ steps.pr_info.outputs.pr_number }}';
            const prTitle = '${{ steps.pr_info.outputs.pr_title }}';
            const baseBranch = '${{ steps.pr_info.outputs.base_branch }}';

            // Score emoji and color
            let scoreEmoji, scoreColor;
            if (score >= 90) { scoreEmoji = '🟢 Excellent'; scoreColor = '#16a34a'; }
            else if (score >= 70) { scoreEmoji = '🟡 Good'; scoreColor = '#f59e0b'; }
            else if (score >= 50) { scoreEmoji = '🟠 Fair'; scoreColor = '#f97316'; }
            else { scoreEmoji = '🔴 Poor'; scoreColor = '#dc2626'; }

            // Quality gate status
            const hasHigh = high > 0;
            const qualityGate = hasHigh ? '❌ **BLOCKED** - High severity issues found' : '✅ **PASSED** - No high severity issues';

            const body = `
## 🤖 CodeLens AI 代码审查报告

**PR #${prNum}** · \`${prTitle}\` → \`${baseBranch}\`

---

### 📊 质量评分

| Metric | Value |
|--------|-------|
| **Score** | <span style="color:${scoreColor};font-weight:bold;font-size:1.2em">${score}/100</span> ${scoreEmoji} |
| **Files Scanned** | ${sessionId ? 'Multiple' : 'N/A'} |
| **Lines of Code** | ${loc} |

### 🐛 问题统计

| Severity | Count |
|----------|-------|
| 🔴 High | **${high}** |
| 🟡 Medium | **${medium}** |
| 🟢 Low | **${low}** |
| **Total** | **${total}** |

### 🚦 Quality Gate

${qualityGate}

> ${hasHigh ? 'This PR has **high severity** issues. Please address them before merging.' : 'No high severity issues detected. ✅'}

---

### 📋 详细报告

${sessionId ? `📄 **[View Full HTML Report](http://localhost:8090/api/v1/report/${sessionId})**` : '_Configure \`CODELENS_API_URL\` to enable full reports_'}

---

### 🔧 集成说明

1. Deploy CodeLens AI backend to a server
2. Set \`CODELENS_API_URL\` secret to your service URL
3. Set \`CODELENS_MIN_SCORE\` secret (0-100) for strict quality gates
4. PR reviews will include full analysis on next push

---

*🤖 Generated by **CodeLens AI** · AI-Powered Code Review SaaS*
`;

            // Find existing comment
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(prNum),
            });

            const existing = comments.data.find(c =>
              c.body.includes('## 🤖 CodeLens AI 代码审查报告')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
              console.log('Updated existing CodeLens comment');
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parseInt(prNum),
                body: body,
              });
              console.log('Created new CodeLens comment');
            }

            // Set output for next job
            core.setOutput('quality_gate_passed', String(!hasHigh));
            core.setOutput('scan_score', String(score));

  # ──────────────────────────────────────────────────────────
  # Quality Gate Job - blocks PR merge when high severity > 0
  # ──────────────────────────────────────────────────────────
  quality-gate:
    runs-on: ubuntu-latest
    needs: codelens-review
    if: github.event_name == 'pull_request'
    permissions:
      statuses: write
    steps:
      - name: Check quality gate
        run: |
          GATE_PASSED="${{ needs.codelens-review.outputs.quality_gate_passed }}"
          SCORE="${{ needs.codelens-review.outputs.scan_score }}"
          MIN_SCORE="${CODELENS_MIN_SCORE:-0}"

          echo "Quality Gate Check"
          echo "──────────────────────────"
          echo "High severity issues: $GATE_PASSED (true=passed)"
          echo "Scan score: $SCORE"
          echo "Min score threshold: $MIN_SCORE"

          # Check high severity gate
          if [ "$GATE_PASSED" != "true" ]; then
            echo ""
            echo "❌ QUALITY GATE FAILED"
            echo "High severity vulnerabilities detected. Please fix before merging."
            echo "github.event.inputs.pr_number: ${{ github.event.inputs.pr_number }}"
            echo ""
            # Note: We use a PR status check rather than failing the workflow
            # to allow the PR to remain mergeable for urgent hotfixes
            echo "quality_gate_status=failed" >> $GITHUB_OUTPUT
            echo "::notice file=README.md::⚠️ CodeLens AI: High severity issues found - review required"
          else
            echo ""
            echo "✅ QUALITY GATE PASSED"
            echo "No high severity issues detected."
            echo "quality_gate_status=passed" >> $GITHUB_OUTPUT
          fi

          # Check minimum score gate
          if [ "$SCORE" -lt "$MIN_SCORE" ] && [ "$MIN_SCORE" -gt "0" ]; then
            echo ""
            echo "⚠️  SCORE GATE FAILED"
            echo "Code quality score ($SCORE) is below minimum threshold ($MIN_SCORE)"
            echo "::warning file=README.md::CodeLens AI: Score below threshold"
          fi

      - name: Set PR status check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          STATUS="${{ env.quality_gate_status || 'passed' }}"
          echo "Setting PR status to: $STATUS"

          # Use gh CLI to set commit status
          if [ "$STATUS" = "failed" ]; then
            gh api repos/${{ github.repository }}/statuses/${{ github.sha }} \
              --field state=error \
              --field target_url=https://github.com/${{ github.repository }}/pull/${{ github.event.pull_request.number }} \
              --field description="CodeLens AI: High severity issues detected" \
              --field context="CodeLens AI/quality-gate" \
              2>/dev/null || echo "Status check update skipped"
          else
            gh api repos/${{ github.repository }}/statuses/${{ github.sha }} \
              --field state=success \
              --field target_url=https://github.com/${{ github.repository }}/pull/${{ github.event.pull_request.number }} \
              --field description="CodeLens AI: Quality gate passed" \
              --field context="CodeLens AI/quality-gate" \
              2>/dev/null || echo "Status check update skipped"
          fi
